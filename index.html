<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>榕驿通 · 专属退货风险诊断报告</title>
<style>
  :root { --teal: #6CBF96; --teal-light: #E1F5EE; --navy: #1a2540; --red: #EF4444; --orange: #F97316; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #F3F4F8; color: #1F2937; font-size: 14px; min-height: 100vh; }
  #loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }
  .loading-logo, .loading-title, .loading-sub, .loading-bar { as previous... } /* 样式保持不变，省略以节省篇幅 */
  /* （完整样式代码太长，这里省略，请保留你上一个版本的 <style> 部分） */
</style>
</head>
<body>

<div id="loading-screen"> ... </div>   <!-- 保持原有 loading 部分 -->

<div id="report">
  <!-- 保持原有 header、score、loss 等结构 -->
  <div class="url-hint" id="url-hint">数据来源：<strong id="url-source">—</strong></div>
  <!-- ... 其他 HTML 结构保持不变 ... -->

  <div class="loss-section">
    <div class="loss-title">年度退货损耗估算区间</div>
    <div class="loss-number" id="loss-number">¥—</div>
    <div class="loss-sub" id="loss-sub">基于您的退货率、订单量及货值估算</div>
    <div class="loss-breakdown">
      <div class="loss-item"><div class="loss-item-label">退货率</div><div class="loss-item-val" id="loss-rate">—</div></div>
      <div class="loss-item"><div class="loss-item-label">月均订单量</div><div class="loss-item-val" id="loss-orders">—</div></div>
      <div class="loss-item"><div class="loss-item-label">单品货值</div><div class="loss-item-val" id="loss-price">—</div></div>
      <div class="loss-item"><div class="loss-item-label">行业对标</div><div class="loss-item-val" id="loss-above">—</div></div>
    </div>
  </div>

  <!-- 其他 card 部分保持 -->
</div>

<script>
const API_BASE = 'https://ai-report-api.1679889934.workers.dev';

function safeDecode(str) {
  if (!str) return '';
  try { return decodeURIComponent(str); } catch(e) { return str; }
}

function parseURLParams() {
  const result = {};
  const pairs = window.location.search.substring(1).split('&');
  for (let pair of pairs) {
    if (!pair) continue;
    let [key, value] = pair.split('=');
    if (key) {
      key = safeDecode(key);
      value = safeDecode(value || '');
      result[key] = value;
      console.log(key, '=>', value);
    }
  }

  return {
    company: result['field_1'] || '您的企业',
    category: result['field_7'] || '',
    platforms: (result['field_5'] || '').split(/[,\s，；;]+/).filter(Boolean),
    markets: (result['field_4'] || '').split(/[,\s，；;]+/).filter(Boolean),
    returnRate: result['field_13'] || '',
    orders: result['field_14'] || '',
    price: result['field_15'] || '',
    handling: result['field_11'] || '',
    newMarket: result['field_12'] || ''
  };
}

function calculateLoss(returnRate, orders, price) {
  const rate = parseFloat(returnRate) || 8;
  const orderNum = parseFloat(orders) || 10000;
  const unitPrice = parseFloat(price) || 300;
  const minLoss = Math.round(orderNum * 12 * (rate / 100) * unitPrice * 0.8);
  const maxLoss = Math.round(orderNum * 12 * (rate / 100) * unitPrice * 1.3);
  return { min: minLoss, max: maxLoss };
}

function renderReport(data) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('report').style.display = 'block';

  document.getElementById('r-company').textContent = data.company;
  document.getElementById('r-date').textContent = new Date().toISOString().slice(0,10);

  const tags = [...data.platforms, data.category].filter(Boolean);
  document.getElementById('r-tags').innerHTML = tags.map(t => `<span class="r-tag">${t}</span>`).join('');

  // 评分
  document.getElementById('score-num').textContent = '53';
  document.getElementById('score-level').textContent = '中高风险';

  // 损耗计算
  const loss = calculateLoss(data.returnRate, data.orders, data.price);
  document.getElementById('loss-number').textContent = `¥${(loss.min/10000).toFixed(1)}万 ~ ¥${(loss.max/10000).toFixed(1)}万`;
  document.getElementById('loss-rate').textContent = data.returnRate || '—';
  document.getElementById('loss-orders').textContent = data.orders || '—';
  document.getElementById('loss-price').textContent = data.price || '—';
  document.getElementById('loss-above').textContent = '高于行业均值';

  document.getElementById('url-hint').classList.add('show');
  document.getElementById('url-source').textContent = '📊 本地诊断引擎';
}

window.onload = function() {
  const urlData = parseURLParams();
  console.log('解析到的数据:', urlData);
  
  setTimeout(() => {
    renderReport(urlData);
  }, 600);
};
</script>
</body>
</html>
