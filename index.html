<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>榕驿通 · 专属退货风险诊断报告</title>
<style>
  :root {
    --teal: #6CBF96;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --teal-dark: #0F6E56;
    --navy: #1a2540;
    --gold: #C9A84C;
    --gold-light: #FFF8EA;
    --red: #EF4444;
    --orange: #F97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #F3F4F8;
    color: #1F2937;
    font-size: 14px;
    min-height: 100vh;
  }
  /* Loading Screen */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease;
  }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }
  .loading-logo {
    width: 64px; height: 64px;
    background: var(--teal);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    font-size: 28px;
  }
  .loading-title {
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .loading-sub {
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    margin-bottom: 32px;
  }
  .loading-bar {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .loading-steps {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    min-height: 20px;
    text-align: center;
  }

  /* Main Report */
  #report {
    display: none;
    max-width: 420px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* Header */
  .r-header {
    background: var(--navy);
    padding: 24px 20px 20px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .r-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(108,191,150,0.1);
  }
  .r-brand {
    font-size: 11px;
    color: var(--teal);
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .r-brand::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--teal);
    border-radius: 50%;
    display: block;
  }
  .r-company {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .r-meta {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .r-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .r-tag {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* Score */
  .score-section {
    background: #fff;
    margin: 12px;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .score-title {
    font-size: 12px;
    color: #9CA3AF;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .score-main {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .score-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .score-ring svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .score-num {
    font-size: 26px;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }
  .score-unit {
    font-size: 10px;
    color: #9CA3AF;
    position: relative;
    z-index: 1;
  }
  .score-info { flex: 1; }
  .score-level {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .score-desc {
    font-size: 12px;
    color: #6B7280;
    line-height: 1.5;
  }
  .score-bar-wrap {
    margin-top: 16px;
    background: #F3F4F6;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 1.5s ease;
    width: 0%;
  }

  /* Loss Calc */
  .loss-section {
    background: #fff;
    margin: 0 12px 12px;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .loss-title {
    font-size: 12px;
    color: #9CA3AF;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .loss-number {
    font-size: 24px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .loss-sub { font-size: 12px; color: #9CA3AF; margin-bottom: 16px; }
  .loss-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .loss-item {
    background: #F9FAFB;
    border-radius: 8px;
    padding: 10px;
  }
  .loss-item-label { font-size: 11px; color: #9CA3AF; margin-bottom: 3px; }
  .loss-item-val { font-size: 14px; font-weight: 600; color: var(--navy); }

  /* Card */
  .card {
    background: #fff;
    margin: 0 12px 12px;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .card-title {
    font-size: 12px;
    color: #9CA3AF;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title::before {
    content: attr(data-icon);
    font-style: normal;
  }

  /* Insights */
  .insight-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .insight-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .insight-text {
    font-size: 13px;
    color: #374151;
    line-height: 1.6;
    flex: 1;
  }

  /* Alerts */
  .alert-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .alert-red { background: #FEF2F2; border: 1px solid #FECACA; }
  .alert-yellow { background: #FFFBEB; border: 1px solid #FDE68A; }
  .alert-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--orange); }
  .alert-text { font-size: 12px; color: #374151; line-height: 1.5; }

  /* ===== URL 参数提示条 ===== */
  .url-hint {
    background: #FEF3C7;
    margin: 12px;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    color: #92400E;
    line-height: 1.5;
    border: 1px solid #FCD34D;
    display: none;
  }
  .url-hint.show { display: block; }
  .url-hint strong { color: #78350F; }

  /* Tier badge */
  .tier-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 6px;
    margin-bottom: 6px;
  }
  .tier-badge::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
    display: block;
  }
  .tier-1 { background: #FEF2F2; color: #DC2626; }
  .tier-2 { background: #FFF7ED; color: #EA580C; }
  .tier-3 { background: #FEFCE8; color: #CA8A04; }
  .tier-4 { background: #F0FDF4; color: #16A34A; }

  /* Tier track */
  .tier-track-wrap { margin-top: 14px; }
  .tier-track-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .tier-track-label span { font-size: 10px; color: #9CA3AF; }
  .tier-track {
    display: flex; height: 10px; border-radius: 5px; overflow: hidden; gap: 2px;
    background: transparent; position: relative;
  }
  .tier-seg { flex: 1; border-radius: 3px; position: relative; }
  .tier-seg-1 { background: #6EE7B7; }  
  .tier-seg-2 { background: #86EFAC; }  
  .tier-seg-3 { background: #FCD34D; }  
  .tier-seg-4 { background: #FCA5A5; }  
  .tier-pointer {
    position: absolute; top: -4px; width: 18px; height: 18px; border-radius: 50%;
    border: 2.5px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    transform: translateX(-50%); transition: left 1.5s ease, background 0.4s ease; z-index: 2;
  }
  .tier-labels { display: flex; justify-content: space-between; margin-top: 5px; }
  .tier-labels span { font-size: 10px; color: #9CA3AF; flex: 1; text-align: center; }
  .tier-labels span.active-tier { font-weight: 600; font-size: 11px; }
  .tier-1-active { color: #DC2626; }
  .tier-2-active { color: #EA580C; }
  .tier-3-active { color: #CA8A04; }
  .tier-4-active { color: #16A34A; }

  /* Benchmark */
  .bench-item { margin-bottom: 14px; }
  .bench-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bench-name { font-size: 12px; color: #374151; }
  .bench-val { font-size: 12px; font-weight: 600; color: var(--navy); }
  .bench-track { height: 6px; background: #F3F4F6; border-radius: 3px; overflow: hidden; }
  .bench-fill { height: 100%; border-radius: 3px; transition: width 1.5s ease; width: 0%; }
  .fill-you { background: var(--red); }
  .fill-avg { background: var(--teal); }
  .fill-best { background: #10B981; }

  /* CTA */
  .cta-section {
    margin: 0 12px 12px; border-radius: 14px; overflow: hidden; background: var(--navy);
    padding: 24px 20px; color: #fff; text-align: center;
  }
  .cta-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .cta-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .cta-btn {
    display: block; background: var(--teal); color: #fff; padding: 14px; border-radius: 10px;
    font-size: 15px; font-weight: 600; text-decoration: none; margin-bottom: 10px;
    cursor: pointer; border: none; width: 100%; transition: opacity 0.2s;
  }
  .cta-btn:active { opacity: 0.85; }
  .cta-btn-2 {
    display: block; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
    padding: 12px; border-radius: 10px; font-size: 13px; text-decoration: none;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.12); width: 100%; transition: opacity 0.2s;
  }
  .cta-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 12px; }
  .footer-note { text-align: center; padding: 16px; font-size: 11px; color: #9CA3AF; }

  @keyframes countUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">🔍</div>
  <div class="loading-title">正在生成专属报告</div>
  <div class="loading-sub">AI正在分析您的经营数据...</div>
  <div class="loading-bar"><div class="loading-bar-fill" id="loading-fill"></div></div>
  <div class="loading-steps" id="loading-step">初始化分析模型...</div>
</div>

<div id="report">
  <div class="url-hint" id="url-hint">数据来源：<strong id="url-source">—</strong></div>

  <div class="r-header">
    <div class="r-brand">榕汇智链 · 榕驿通 专属风险诊断报告</div>
    <div class="r-company" id="r-company">正在分析您的数据...</div>
    <div class="r-meta"><span id="r-date">2026-06-22</span><span>·</span><span>报告有效期30天</span></div>
    <div class="r-tags" id="r-tags"></div>
  </div>

  <div class="score-section">
    <div class="score-title">退货风险评分 <span style="font-size:10px;color:#C4B5A0;font-weight:400;">(分数越高代表退货风险越高)</span></div>
    <div class="score-main">
      <div class="score-ring" id="score-ring-container">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#F3F4F6" stroke-width="8"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke-width="8" stroke-linecap="round" id="score-circle" stroke-dasharray="213.6" stroke-dashoffset="213.6" style="transition: stroke-dashoffset 1.5s ease;"/>
        </svg>
        <div class="score-num" id="score-num">0</div>
        <div class="score-unit">分
