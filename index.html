<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>榕驿通 · 专属退货风险诊断报告</title>
<style>
  :root { --teal: #6CBF96; --teal-light: #E1F5EE; --navy: #1a2540; --red: #EF4444; --orange: #F97316; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #F3F4F8; color: #1F2937; font-size: 14px; min-height: 100vh; }
  #loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }
  .loading-logo { width: 64px; height: 64px; background: var(--teal); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 28px; }
  .loading-title { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .loading-sub { color: rgba(255,255,255,0.55); font-size: 13px; margin-bottom: 32px; }
  .loading-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  .loading-bar-fill { height: 100%; background: var(--teal); border-radius: 2px; width: 0%; transition: width 0.2s ease; }
  #report { display: none; max-width: 420px; margin: 0 auto; padding-bottom: 40px; }
  .r-header { background: var(--navy); padding: 24px 20px 20px; color: #fff; position: relative; overflow: hidden; }
  .r-brand { font-size: 11px; color: var(--teal); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .r-brand::before { content: ''; width: 6px; height: 6px; background: var(--teal); border-radius: 50%; display: block; }
  .r-company { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .r-meta { font-size: 12px; color: rgba(255,255,255,0.5); display: flex; gap: 12px; margin-bottom: 16px; }
  .r-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .r-tag { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); font-size: 11px; padding: 3px 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); }
  .score-section, .loss-section, .card { background: #fff; margin: 12px; border-radius: 14px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .score-title, .loss-title, .card-title { font-size: 12px; color: #9CA3AF; margin-bottom: 14px; letter-spacing: 0.5px; }
  .score-main { display: flex; align-items: center; gap: 16px; }
  .score-ring { width: 80px; height: 80px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .score-num { font-size: 26px; font-weight: 700; position: relative; z-index: 1; }
  .score-unit { font-size: 10px; color: #9CA3AF; position: relative; z-index: 1; }
  .score-info { flex: 1; }
  .score-level { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .score-desc { font-size: 12px; color: #6B7280; line-height: 1.5; }
  .loss-number { font-size: 24px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
  .loss-sub { font-size: 12px; color: #9CA3AF; margin-bottom: 16px; }
  .loss-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .loss-item { background: #F9FAFB; border-radius: 8px; padding: 10px; }
  .loss-item-label { font-size: 11px; color: #9CA3AF; margin-bottom: 3px; }
  .loss-item-val { font-size: 14px; font-weight: 600; color: var(--navy); }
  .insight-item, .alert-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
  .insight-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--teal-light); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .insight-text, .alert-text { font-size: 13px; color: #374151; line-height: 1.6; }
  .alert-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; }
  .alert-red { background: #FEF2F2; border: 1px solid #FECACA; }
  .alert-yellow { background: #FFFBEB; border: 1px solid #FDE68A; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .dot-red { background: var(--red); } .dot-yellow { background: var(--orange); }
  .url-hint { background: #FEF3C7; margin: 12px; border-radius: 10px; padding: 10px 14px; font-size: 11px; color: #92400E; display: none; }
  .url-hint.show { display: block; }
  .tier-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin: 6px 0; }
  .tier-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.7; }
  .tier-1 { background: #FEF2F2; color: #DC2626; } .tier-2 { background: #FFF7ED; color: #EA580C; } .tier-3 { background: #FEFCE8; color: #CA8A04; } .tier-4 { background: #F0FDF4; color: #16A34A; }
  .tier-track-wrap { margin-top: 14px; }
  .tier-track-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .tier-track-label span, .tier-labels span { font-size: 10px; color: #9CA3AF; }
  .tier-track { display: flex; height: 10px; border-radius: 5px; overflow: hidden; gap: 2px; position: relative; }
  .tier-seg { flex: 1; border-radius: 3px; position: relative; }
  .tier-seg-1 { background: #6EE7B7; } .tier-seg-2 { background: #86EFAC; } .tier-seg-3 { background: #FCD34D; } .tier-seg-4 { background: #FCA5A5; }
  .tier-pointer { position: absolute; top: -4px; width: 18px; height: 18px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.18); transform: translateX(-50%); transition: left 1.5s ease; z-index: 2; }
  .tier-labels { display: flex; justify-content: space-between; margin-top: 5px; }
  .tier-labels span { flex: 1; text-align: center; }
  .tier-labels span.active-tier { font-weight: 600; font-size: 11px; }
  .tier-1-active { color: #DC2626; } .tier-2-active { color: #EA580C; } .tier-3-active { color: #CA8A04; } .tier-4-active { color: #16A34A; }
  .bench-item { margin-bottom: 14px; }
  .bench-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bench-name { font-size: 12px; color: #374151; } .bench-val { font-size: 12px; font-weight: 600; color: var(--navy); }
  .bench-track { height: 6px; background: #F3F4F6; border-radius: 3px; overflow: hidden; }
  .bench-fill { height: 100%; border-radius: 3px; transition: width 1.5s ease; width: 0%; }
  .fill-you { background: var(--red); } .fill-avg { background: var(--teal); } .fill-best { background: #10B981; }
  .cta-section { margin: 12px; border-radius: 14px; background: var(--navy); padding: 24px 20px; color: #fff; text-align: center; }
  .cta-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .cta-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .cta-btn { display: block; background: var(--teal); color: #fff; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; width: 100%; cursor: pointer; }
  .cta-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 12px; }
  .footer-note { text-align: center; padding: 16px; font-size: 11px; color: #9CA3AF; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">🔍</div>
  <div class="loading-title">正在生成诊断报告</div>
  <div class="loading-sub">AI正在深度解析经营数据...</div>
  <div class="loading-bar"><div class="loading-bar-fill" id="loading-fill"></div></div>
</div>

<div id="report">
  <div class="url-hint" id="url-hint">数据来源：<strong id="url-source">—</strong></div>
  <div class="r-header">
    <div class="r-brand">榕汇智链 · 专属风险诊断报告</div>
    <div class="r-company" id="r-company">数据解析中...</div>
    <div class="r-meta"><span id="r-date"></span><span>·</span><span>报告有效期30天</span></div>
    <div class="r-tags" id="r-tags"></div>
  </div>

  <div class="score-section">
    <div class="score-title">退货风险评分 <span style="font-size:10px;color:#C4B5A0;">(分数越高代表风险越大)</span></div>
    <div class="score-main">
      <div class="score-ring">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#F3F4F6" stroke-width="8"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke-width="8" stroke-linecap="round" id="score-circle" stroke-dasharray="213.6" stroke-dashoffset="213.6" style="transition: stroke-dashoffset 1.5s ease;"/>
        </svg>
        <div class="score-num" id="score-num">0</div><div class="score-unit">分</div>
      </div>
      <div class="score-info">
        <div class="score-level" id="score-level">—</div>
        <div id="tier-badge" class="tier-badge tier-1">—</div>
        <div class="score-desc" id="score-desc">—</div>
      </div>
    </div>
    <div class="tier-track-wrap">
      <div class="tier-track-label"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>
      <div class="tier-track">
        <div class="tier-seg tier-seg-1"></div><div class="tier-seg tier-seg-2"></div>
        <div class="tier-seg tier-seg-3"></div><div class="tier-seg tier-seg-4"></div>
        <div class="tier-pointer" id="tier-pointer" style="left:0%;background:#10B981;"></div>
      </div>
      <div class="tier-labels" id="tier-labels">
        <span>✅健康区<br>运营出色</span><span>📊中低风险<br>建议优化</span>
        <span>⚠️中高风险<br>值得关注</span><span>⚡高风险区<br>需立即行动</span>
      </div>
    </div>
  </div>

  <div class="loss-section">
    <div class="loss-title">年度退货损耗估算区间</div>
    <div class="loss-number" id="loss-number">¥—</div>
    <div class="loss-sub" id="loss-sub">估算基础数据加载中...</div>
    <div class="loss-breakdown">
      <div class="loss-item"><div class="loss-item-label">退货率</div><div class="loss-item-val" id="loss-rate">—</div></div>
      <div class="loss-item"><div class="loss-item-label">月均订单量</div><div class="loss-item-val" id="loss-orders">—</div></div>
      <div class="loss-item"><div class="loss-item-label">单品货值</div><div class="loss-item-val" id="loss-price">—</div></div>
      <div class="loss-item"><div class="loss-item-label">行业对标</div><div class="loss-item-val" id="loss-above">—</div></div>
    </div>
  </div>

  <div class="card"><div class="card-title">💡 AI核心洞察</div><div id="insights-container"></div></div>
  <div class="card"><div class="card-title">⚠️ 风险预警</div><div id="alerts-container"></div></div>
  <div class="card"><div class="card-title">📊 行业对标</div><div id="benchmark-container"></div></div>

  <div class="cta-section">
    <div class="cta-title" id="cta-title">系统诊断完成</div>
    <div class="cta-sub" id="cta-sub">请根据报告情况配置专属方案</div>
    <button class="cta-btn" onclick="alert('即将跳转企业微信添加专属顾问')">立即添加专属顾问 →</button>
  </div>
  <div class="footer-note">保密文件 · 仅供内部经营诊断参考</div>
</div>

<script>
const API_BASE = 'https://ai-report-api.1679889934.workers.dev';

function getTierInfo(score) {
  if (score >= 75) return { label: '⚡ 高风险区', badgeClass: 'tier-1', index: 3, activeClass: 'tier-1-active' };
  if (score >= 50) return { label: '⚠️ 中高风险', badgeClass: 'tier-2', index: 2, activeClass: 'tier-2-active' };
  if (score >= 25) return { label: '📊 中低风险', badgeClass: 'tier-3', index: 1, activeClass: 'tier-3-active' };
  return { label: '✅ 健康区', badgeClass: 'tier-4', index: 0, activeClass: 'tier-4-active' };
}

function parseRange(str) {
  if (!str) return { min: 0, max: 0, avg: 0, raw: '' };
  const nums = str.match(/\d+(\.\d+)?/g);
  if (!nums) return { min: 0, max: 0, avg: 0, raw: str };
  const n = nums.map(Number);
  if (n.length === 1) {
    if (str.includes('以上')) return { min: n[0], max: n[0] * 1.5, avg: n[0] * 1.2 };
    if (str.includes('以下')) return { min: n[0] * 0.5, max: n[0], avg: n[0] * 0.8 };
    return { min: n[0], max: n[0], avg: n[0] };
  }
  return { min: Math.min(n[0], n[1]), max: Math.max(n[0], n[1]), avg: (n[0] + n[1]) / 2 };
}

function parseURLParams() {
  const params = new URLSearchParams(window.location.search);
  if (!params.toString()) return null;
  return {
    company: params.get('company') || params.get('field_1') || '',
    returnRate: params.get('returnRate') || params.get('field_8') || '',
    orders: params.get('orders') || params.get('field_9') || '',
    price: params.get('price') || params.get('field_10') || '',
    handling: params.get('handling') || params.get('field_11') || '',
    category: params.get('category') || params.get('field_7') || '',
    platforms: (params.get('platforms') || params.get('field_5') || '').split(',').filter(Boolean),
    markets: (params.get('markets') || params.get('field_4') || '').split(',').filter(Boolean),
    newMarket: params.get('newMarket') || params.get('field_12') || ''
  };
}

async function fetchAI(formData) {
  try {
    const resp = await fetch(API_BASE + '/api/generate-report', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ form: formData })
    });
    if (!resp.ok) throw new Error('网络请求被阻挡');
    
    // 直接获取 JSON 对象，彻底砍掉复杂解析导致崩溃的环节
    const result = await resp.json(); 
    if(!result || !result.score) throw new Error('数据结构丢失');

    const tags = [...(formData.platforms||[]), formData.category||'', ...(formData.markets||[])].filter(Boolean);
    const finalData = {
      company: formData.company || '某跨境公司',
      tags: tags.length ? tags : ['跨境电商'],
      score: result.score || 0,
      level: result.level || '低风险',
      levelColor: result.levelColor || '#10B981',
      scoreDesc: result.scoreDesc || '诊断已完成',
      lossMin: result.lossMin || 0,
      lossMax: result.lossMax || 0,
      lossBasis: result.lossBasis || '基于系统模型测算',
      rate: result.rate || formData.returnRate || '-',
      orders: result.orders || formData.orders || '-',
      price: result.price || formData.price || '-',
      above: result.above || '-',
      insights: result.insights || [],
      alerts: result.alerts || [],
      benchmark: result.benchmark || [],
      cta: result.cta || { title: '查看专属方案', sub: '即刻联系配置' }
    };
    
    document.getElementById('url-hint').classList.add('show');
    document.getElementById('url-source').textContent = '🤖 智谱AI深度诊断引擎';
    renderReport(finalData);
  } catch (err) {
    console.warn("AI调用失败，启用本地保底引擎:", err);
    runLocalEngine(formData);
  }
}

function runLocalEngine(f) {
  const rr = parseRange(f.returnRate);
  const ord = parseRange(f.orders);
  const pr = parseRange(f.price);
  let score = 50;
  
  if (rr.avg > 0) score = rr.avg * 3.5 + (ord.avg / 800);
  const hd = f.handling || '';
  if(hd.includes('自担') || hd.includes('直接退款')) score += 25;
  else if(hd.includes('销毁') || hd.includes('清货')) score += 15;
  else if(hd.includes('退回国内')) score += 10;
  else if(hd.includes('保险')) score -= 5;

  const catMap = { '服装/鞋类': 5, '运动户外': 3, '美妆个护': 3, '家居用品': 2, '玩具/母婴': 1 };
  score += catMap[f.category] || 0;
  if ((f.markets||[]).join('').includes('美') || (f.markets||[]).join('').includes('欧')) score += 4;
  if (f.newMarket && f.newMarket.includes('是')) score += 3;
  if ((f.platforms||[]).join('').includes('FBA') || (f.platforms||[]).join('').includes('托管')) score -= 5;
  
  score = Math.max(3, Math.min(97, Math.round(score)));
  const level = score >= 75 ? '高风险' : score >= 50 ? '中风险' : '低风险';
  const levelColor = score >= 75 ? '#EF4444' : score >= 50 ? '#F97316' : '#10B981';

  const avgRate = { '服装/鞋类': 10, '美妆个护': 7, '3C数码/电子产品': 4, '家居用品': 6, '运动户外': 8, '玩具/母婴': 6 }[f.category] || 6;
  const abovePct = rr.avg > 0 ? Math.round((rr.avg - avgRate) / avgRate * 100) : 0;
  
  const tags = [...(f.platforms||[]), f.category||'', ...(f.markets||[])].filter(Boolean);
  
  const finalData = {
    company: f.company || '某跨境公司',
    tags: tags.length ? tags : ['基础评估'],
    score, level, levelColor,
    scoreDesc: `基于您填写的经营区间评估，当前退货风险处于${level}。`,
    lossMin: Math.round(ord.min * 12 * (rr.min / 100) * pr.min), 
    lossMax: Math.round(ord.max * 12 * (rr.max / 100) * pr.max),
    lossBasis: `基于填写的退货率、订单量及均价区间估算`,
    rate: f.returnRate || '未知', orders: f.orders || '未知', price: f.price || '未知',
    above: (abovePct >= 0 ? '+' : '') + abovePct + '%',
    insights: [{ icon:'💡', text:`当前诊断采用基础离线测算引擎。` }, { icon:'📦', text:'如需获取更精准的AI洞察，请确保网络通畅。' }],
    alerts: [],
    cta: { title: '查看专属方案', sub: '立即获取定制化退货保障方案' },
    benchmark: [
      { name: '您的退货率均值', val: rr.avg + '%', pct: Math.min(100, rr.avg/15*100), cls: score>=50?'fill-you':'fill-best' },
      { name: '行业均值', val: avgRate + '%', pct: avgRate/15*100, cls: 'fill-avg' }
    ]
  };

  document.getElementById('url-hint').classList.add('show');
  document.getElementById('url-source').textContent = '📊 基础计算引擎 (基于区间)';
  renderReport(finalData);
}

function renderReport(d) {
  // 隐藏加载页，展示报告
  const ls = document.getElementById('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => { ls.style.display = 'none'; document.getElementById('report').style.display = 'block'; }, 500);

  document.getElementById('r-company').textContent = d.company;
  document.getElementById('r-date').textContent = new Date().toISOString().slice(0,10);
  document.getElementById('r-tags').innerHTML = d.tags.map(t => `<span class="r-tag">${t}</span>`).join('');
  
  const scoreEl = document.getElementById('score-num');
  const circle = document.getElementById('score-circle');
  circle.style.stroke = d.levelColor;
  
  let start = 0, target = d.score, step = 16, inc = target / (1500 / step);
  const scoreTimer = setInterval(() => {
    start = Math.min(start + inc, target);
    scoreEl.textContent = Math.round(start);
    circle.style.strokeDashoffset = 213.6 * (1 - start / 100);
    document.getElementById('tier-pointer').style.left = start + '%';
    if (start >= target) clearInterval(scoreTimer);
  }, step);
  
  document.getElementById('score-level').style.color = d.levelColor;
  document.getElementById('score-level').textContent = d.level;
  document.getElementById('score-desc').textContent = d.scoreDesc;
  
  const tierInfo = getTierInfo(d.score);
  const badge = document.getElementById('tier-badge');
  badge.className = 'tier-badge ' + tierInfo.badgeClass; badge.textContent = tierInfo.label;
  document.getElementById('tier-pointer').style.background = d.levelColor;
  const labels = document.querySelectorAll('#tier-labels span');
  labels.forEach((el, i) => { el.className = ''; if (i === tierInfo.index) el.classList.add('active-tier', tierInfo.activeClass); });
  
  const lossEl = document.getElementById('loss-number');
  let lossStart = 0, lossInc = d.lossMax / (1500 / step);
  const lossTimer = setInterval(() => {
    lossStart = Math.min(lossStart + lossInc, d.lossMax);
    const ratio = d.lossMax > 0 ? lossStart / d.lossMax : 0;
    const curMin = Math.round(d.lossMin * ratio);
    lossEl.textContent = '¥' + (curMin / 10000).toFixed(1) + '万 ~ ¥' + (Math.round(lossStart) / 10000).toFixed(1) + '万';
    if (lossStart >= d.lossMax) clearInterval(lossTimer);
  }, step);
  
  document.getElementById('loss-sub').textContent = d.lossBasis;
  document.getElementById('loss-rate').textContent = d.rate;
  document.getElementById('loss-orders').textContent = d.orders;
  document.getElementById('loss-price').textContent = d.price;
  document.getElementById('loss-above').textContent = d.above;
  
  if (d.insights.length) document.getElementById('insights-container').innerHTML = d.insights.map(i => `<div class="insight-item"><div class="insight-icon">${i.icon}</div><div class="insight-text">${i.text}</div></div>`).join('');
  if (d.alerts.length) document.getElementById('alerts-container').innerHTML = d.alerts.map(a => `<div class="alert-item alert-${a.type}"><div class="alert-dot dot-${a.type}"></div><div class="alert-text">${a.text}</div></div>`).join('');
  if (d.benchmark.length) {
    document.getElementById('benchmark-container').innerHTML = d.benchmark.map(b => `<div class="bench-item"><div class="bench-label"><span class="bench-name">${b.name}</span><span class="bench-val">${b.val}</span></div><div class="bench-track"><div class="bench-fill ${b.cls}" data-pct="${b.pct}" style="width:0%"></div></div></div>`).join('');
    setTimeout(() => { document.querySelectorAll('.bench-fill').forEach(el => { el.style.width = el.dataset.pct + '%'; }); }, 300);
  }
  
  document.getElementById('cta-title').textContent = d.cta.title;
  document.getElementById('cta-sub').textContent = d.cta.sub;
}

window.onload = function() {
  let fill = 0;
  const fillEl = document.getElementById('loading-fill');
  const timer = setInterval(() => {
    fill += 5; fillEl.style.width = Math.min(fill, 100) + '%';
    if (fill >= 100) {
      clearInterval(timer);
      const urlData = parseURLParams();
      // 这里添加了强制延时，确保加载动画能被人类肉眼看完整
      setTimeout(() => {
        if (urlData) fetchAI(urlData);
        else runLocalEngine({ company:'某测试跨境公司', returnRate:'12%-20%', orders:'5000-2万单', price:'500-1000元', category:'服装/鞋类' });
      }, 400);
    }
  }, 50);
};
</script>
